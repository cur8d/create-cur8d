name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
      - uses: jdx/mise-action@v4
      - name: Publish to npm
        run: mise run publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
